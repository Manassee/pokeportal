<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéPortal</title>
</head>
<body>
    <h1>Mein PokéPortal</h1>
    <p>Willkommen! Hier findest du alle Pokémon.</p>
</body>
</html>





<!--
    Das ist das Grundgerüst jeder HTML-Seite.

    Das <!DOCTYPE html> in Zeile 2 ist kein Tag, es ist eine Deklaration, die dem Browser sagt "dies ist ein HTML5-Dokument". Ohne diese Zeile schaltet der Browser in einen 
    Kompatibilitätsmodus, der zu unvorhersehbarem Verhalten führt.
    Das <html lang="de" ist das Wurzelelement. Alles andere lebt  darin. Das lang Attribut hilft Suchmaschinen und Screenreadern, die Sprache zu erkennen.

    Im <head> stecken unsichtbare Infos: charset="UTF-8" sorgt dafür, dass Umlaute(ä,ö,ü) und Sonderzeichen korrekt angeziegt werden. Die viewport-Meta macht die Seite mobilfreundlich. 
    Der  <title> erscheint im Browser-Tab.
    
    Im <body> steht alles, was der Nutzer sieht: <h1> ist die wichtigste Überschrift der Seite, <p> ein Textabsatz.

-->
