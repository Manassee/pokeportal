<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéPortal</title>

    <!-- CSS Einbindung -->
     <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <header>
        <h1>Pokédex</h1>
        <p></p>
    </header>

    <div class="karten-grid">
        <!-- 1. Pokemon Karte -->
        <div class="pokemon-karte">
            <div class="karte-header">
                <span class="karte-nummer">#025</span>
            </div>

            <div class="karte-bild-bereich">
                <img
                    src="sprites/sprites/pokemon/other/showdown/25.gif"
                    alt="Pikachu"
                
                    >
            </div>

            <div class="karte-info">
                <div class="karte-name">Pikachu</div>
                <div class="karte-typen">
                    <span class="typ-badge typ-electric">Elektro</span>
                </div>
            </div>
        </div>

        <!-- 2. Pokemon Karte -->
        <div class="pokemon-karte">
            <div class="karte-header">
                <span class="karte-nummer">#06</span>
            </div>

                    >
            </div>

            <div class="karte-info">
                <div class="karte-name">Glurak</div>
                <div class="karte-typen">
                    <span class="typ-badge typ-fire">Feuer</span>
                </div>
            </div>
        </div>

        <!-- 3. Pokemon Karte-->
         <div class="pokemon-karte">
            <div class="karte-header">

            <div class="karte-info">
                <div class="karte-name">Serpiroyal</div>
                <div class="karte-typen">
                    <span class="typ-badge typ-gras">Pflanze</span>
                </div>
            </div>
        </div>

         <!-- 4. Pokemon Karte-->
          <div class="pokemon-karte">
            <div class="karte-header">
                <span class="karte-nummer">#398</span>
            </div>

            <div class="karte-bild-bereich">
                <img
                    src="sprites/sprites/pokemon/other/showdown/398.gif"

            <div class="karte-info">

                <div class="karte-typen">
                    <span class="typ-badge typ-electric">Flug</span>
                </div>

        </div>

        <!-- 5. Pokemon Karte-->
         <div class="pokemon-karte">
            <div class="karte-header">
                <span class="karte-nummer">#448</span>
            </div>

            <div class="karte-bild-bereich">
                <img
                    src="sprites/sprites/pokemon/other/showdown/448.gif"

            </div>

            <div class="karte-info">
                <div class="karte-name">Lucario</div>
                <div class="karte-typen">
                    <span class="typ-badge typ-fight">Kampf</span>
                </div>
            </div>
        </div>

        <!-- 6.Pokemon Karte-->
         <div class="pokemon-karte">
            <div class="karte-header">
                <span class="karte-nummer">#445</span>

            <div class="karte-bild-bereich">

    </div>

</html>
